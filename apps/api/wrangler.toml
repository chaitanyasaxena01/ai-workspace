name = "ai-agent-playground-api"
main = "src/index.ts"
compatibility_date = "2025-07-01"
compatibility_flags = ["nodejs_compat"]

# Workers AI / AI Gateway binding
[ai]
binding = "AI"

# KV namespace used by agent tools (notes / memory). Create with:
#   npx wrangler kv namespace create AGENT_KV
[[kv_namespaces]]
binding = "AGENT_KV"
id = "073a31910df14cb3a6f693b265c470b8"

[vars]
# Use Workers AI binding (cloudflare-workers-ai:…). Prefer models that still exist in the catalog.
DEFAULT_MODEL = "cloudflare-workers-ai:@cf/moonshotai/kimi-k2.7-code"

# Secrets (set via `wrangler secret put`, never commit):
#   AUTH_SECRET, OPENAI_API_KEY, ANTHROPIC_API_KEY, CLOUDFLARE_API_KEY
